name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app1
        uses: docker/build-push-action@v5
        with:
          context: ./app1
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/app1:latest

      - name: Build and push app2
        uses: docker/build-push-action@v5
        with:
          context: ./app2
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/app2:latest

      - name: Build and push app2
        uses: docker/build-push-action@v5
        with:
          context: ./app3
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/app3:latest